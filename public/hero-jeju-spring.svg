<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 하늘 그라디언트 -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90c4"/>
      <stop offset="40%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#b8dff0"/>
    </linearGradient>
    <!-- 바다 그라디언트 -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <!-- 들판 그라디언트 -->
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d8a3c"/>
      <stop offset="100%" stop-color="#3d6b28"/>
    </linearGradient>
    <!-- 한라산 그라디언트 -->
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b8e5a"/>
      <stop offset="60%" stop-color="#4a7040"/>
      <stop offset="100%" stop-color="#3a5c30"/>
    </linearGradient>
    <!-- 산 원거리 그라디언트 -->
    <linearGradient id="mountain2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8aaa78" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6a8a58" stop-opacity="0.9"/>
    </linearGradient>
    <!-- 유채꽃밭 노란색 -->
    <linearGradient id="canola" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9d71c"/>
      <stop offset="100%" stop-color="#e6b800"/>
    </linearGradient>
    <!-- 오버레이 (텍스트 가독성) -->
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.38"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="blur-md">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- 하늘 -->
  <rect width="1440" height="900" fill="url(#sky)"/>

  <!-- 구름 1 -->
  <g opacity="0.88" filter="url(#blur-sm)">
    <ellipse cx="260" cy="130" rx="110" ry="38" fill="#ffffff" opacity="0.9"/>
    <ellipse cx="220" cy="140" rx="70" ry="28" fill="#ffffff"/>
    <ellipse cx="310" cy="145" rx="80" ry="26" fill="#ffffff"/>
  </g>
  <!-- 구름 2 -->
  <g opacity="0.75" filter="url(#blur-sm)">
    <ellipse cx="900" cy="90" rx="140" ry="42" fill="#ffffff" opacity="0.85"/>
    <ellipse cx="850" cy="100" rx="90" ry="30" fill="#ffffff"/>
    <ellipse cx="980" cy="98" rx="100" ry="32" fill="#ffffff"/>
  </g>
  <!-- 구름 3 (작은) -->
  <g opacity="0.6" filter="url(#blur-sm)">
    <ellipse cx="1250" cy="160" rx="90" ry="28" fill="#ffffff"/>
    <ellipse cx="1210" cy="168" rx="55" ry="20" fill="#ffffff"/>
  </g>
  <!-- 구름 4 (작은) -->
  <g opacity="0.5">
    <ellipse cx="560" cy="75" rx="60" ry="18" fill="#ffffff"/>
    <ellipse cx="540" cy="82" rx="40" ry="14" fill="#ffffff"/>
  </g>

  <!-- 원거리 바다 (수평선) -->
  <rect x="0" y="390" width="1440" height="120" fill="url(#sea)" opacity="0.6" filter="url(#blur-md)"/>

  <!-- 한라산 (멀리, 흐릿하게) -->
  <path d="M420,420 Q600,180 720,200 Q840,180 1020,420 Z" fill="url(#mountain2)" filter="url(#blur-md)" opacity="0.7"/>
  <!-- 한라산 앞쪽 -->
  <path d="M480,440 Q620,230 720,250 Q820,230 960,440 Z" fill="url(#mountain)" opacity="0.85"/>
  <!-- 한라산 정상 눈(연한 흰색) -->
  <path d="M680,252 Q720,220 760,252 Q740,240 720,235 Q700,240 680,252 Z" fill="#e8f4f8" opacity="0.6"/>

  <!-- 중간 언덕 왼쪽 -->
  <path d="M0,500 Q180,380 360,450 Q480,480 560,500 L0,500 Z" fill="#5a8040" opacity="0.9"/>
  <!-- 중간 언덕 오른쪽 -->
  <path d="M880,500 Q1060,400 1200,450 Q1320,470 1440,490 L1440,500 Z" fill="#5a8040" opacity="0.9"/>

  <!-- 들판 배경 -->
  <path d="M0,500 Q360,460 720,480 Q1080,460 1440,490 L1440,900 L0,900 Z" fill="url(#field)"/>

  <!-- 유채꽃밭 메인 (노란 물결) -->
  <path d="M0,580 Q120,555 240,572 Q360,558 480,575 Q600,555 720,570 Q840,555 960,572 Q1080,555 1200,570 Q1320,558 1440,572 L1440,900 L0,900 Z" fill="url(#canola)"/>

  <!-- 유채꽃 디테일 — 위쪽 경계 불규칙하게 -->
  <path d="M0,570 Q60,560 120,575 Q180,562 240,578 Q300,563 360,576 Q420,562 480,577 Q540,563 600,574 Q660,562 720,576 Q780,563 840,575 Q900,562 960,578 Q1020,563 1080,576 Q1140,562 1200,575 Q1260,562 1320,574 Q1380,563 1440,574 L1440,582 Q1380,572 1320,582 Q1260,570 1200,583 Q1140,570 1080,584 Q1020,571 960,586 Q900,570 840,583 Q780,571 720,584 Q660,571 600,582 Q540,571 480,585 Q420,570 360,584 Q300,571 240,586 Q180,570 120,583 Q60,570 0,580 Z" fill="#f5c800" opacity="0.7"/>

  <!-- 유채꽃 꽃송이 표현 (작은 원들) -->
  <g fill="#fce44a" opacity="0.5">
    <circle cx="80" cy="600" r="6"/><circle cx="160" cy="592" r="5"/><circle cx="240" cy="608" r="7"/>
    <circle cx="320" cy="596" r="5"/><circle cx="400" cy="604" r="6"/><circle cx="480" cy="594" r="5"/>
    <circle cx="560" cy="606" r="7"/><circle cx="640" cy="598" r="5"/><circle cx="720" cy="610" r="6"/>
    <circle cx="800" cy="596" r="5"/><circle cx="880" cy="604" r="7"/><circle cx="960" cy="594" r="5"/>
    <circle cx="1040" cy="608" r="6"/><circle cx="1120" cy="598" r="5"/><circle cx="1200" cy="606" r="7"/>
    <circle cx="1280" cy="594" r="5"/><circle cx="1360" cy="602" r="6"/>
  </g>
  <g fill="#fce44a" opacity="0.35">
    <circle cx="40" cy="622" r="5"/><circle cx="120" cy="630" r="6"/><circle cx="200" cy="618" r="5"/>
    <circle cx="280" cy="632" r="7"/><circle cx="360" cy="620" r="5"/><circle cx="440" cy="634" r="6"/>
    <circle cx="520" cy="622" r="5"/><circle cx="600" cy="636" r="7"/><circle cx="680" cy="624" r="5"/>
    <circle cx="760" cy="638" r="6"/><circle cx="840" cy="626" r="5"/><circle cx="920" cy="640" r="7"/>
    <circle cx="1000" cy="628" r="5"/><circle cx="1080" cy="642" r="6"/><circle cx="1160" cy="630" r="5"/>
    <circle cx="1240" cy="644" r="7"/><circle cx="1320" cy="632" r="5"/><circle cx="1400" cy="646" r="6"/>
  </g>

  <!-- 벚꽃나무 왼쪽 -->
  <g>
    <!-- 나무 줄기 -->
    <path d="M110,640 Q108,580 112,520 Q114,490 110,460" stroke="#5c3d1e" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M110,520 Q90,495 75,470" stroke="#5c3d1e" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M110,500 Q130,475 148,450" stroke="#5c3d1e" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- 벚꽃 뭉치 -->
    <ellipse cx="110" cy="440" rx="55" ry="45" fill="#f4a7b9" opacity="0.85"/>
    <ellipse cx="75" cy="460" rx="38" ry="32" fill="#f4a7b9" opacity="0.8"/>
    <ellipse cx="148" cy="445" rx="40" ry="34" fill="#f9c0ce" opacity="0.8"/>
    <ellipse cx="100" cy="415" rx="42" ry="35" fill="#f9c0ce" opacity="0.75"/>
    <ellipse cx="130" cy="420" rx="38" ry="30" fill="#fbd5df" opacity="0.7"/>
    <!-- 꽃잎 떨어지는 느낌 -->
    <circle cx="85" cy="490" r="3" fill="#f9c0ce" opacity="0.6"/>
    <circle cx="145" cy="500" r="2.5" fill="#f9c0ce" opacity="0.5"/>
    <circle cx="60" cy="510" r="2" fill="#f4a7b9" opacity="0.4"/>
  </g>

  <!-- 벚꽃나무 오른쪽 -->
  <g>
    <path d="M1330,640 Q1332,580 1328,520 Q1326,490 1330,460" stroke="#5c3d1e" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M1330,520 Q1350,495 1365,470" stroke="#5c3d1e" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M1330,500 Q1310,475 1292,450" stroke="#5c3d1e" stroke-width="5" fill="none" stroke-linecap="round"/>
    <ellipse cx="1330" cy="440" rx="55" ry="45" fill="#f4a7b9" opacity="0.85"/>
    <ellipse cx="1365" cy="460" rx="38" ry="32" fill="#f4a7b9" opacity="0.8"/>
    <ellipse cx="1292" cy="445" rx="40" ry="34" fill="#f9c0ce" opacity="0.8"/>
    <ellipse cx="1340" cy="415" rx="42" ry="35" fill="#f9c0ce" opacity="0.75"/>
    <ellipse cx="1310" cy="420" rx="38" ry="30" fill="#fbd5df" opacity="0.7"/>
    <circle cx="1355" cy="490" r="3" fill="#f9c0ce" opacity="0.6"/>
    <circle cx="1295" cy="500" r="2.5" fill="#f9c0ce" opacity="0.5"/>
    <circle cx="1380" cy="510" r="2" fill="#f4a7b9" opacity="0.4"/>
  </g>

  <!-- 작은 돌담 (제주 특색) -->
  <g fill="#6b6560" opacity="0.7">
    <rect x="0" y="655" width="200" height="18" rx="3"/>
    <rect x="5" y="645" width="185" height="14" rx="3"/>
    <rect x="10" y="637" width="170" height="12" rx="3"/>
  </g>
  <g fill="#6b6560" opacity="0.7">
    <rect x="1240" y="655" width="200" height="18" rx="3"/>
    <rect x="1255" y="645" width="185" height="14" rx="3"/>
    <rect x="1270" y="637" width="170" height="12" rx="3"/>
  </g>

  <!-- 어두운 오버레이 (텍스트 가독성 확보) -->
  <rect width="1440" height="900" fill="url(#overlay)"/>
</svg>
